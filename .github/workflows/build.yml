name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - run: flutter config --no-analytics

      - name: Generate clean Flutter project
        run: |
          cd /tmp
          flutter create --org com.uht --project-name uht_store template_app
          cp -r template_app/android/* $GITHUB_WORKSPACE/android/
          cp template_app/.gitignore $GITHUB_WORKSPACE/

      - run: flutter pub get

      - name: Add local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0" >> android/local.properties

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - run: flutter config --no-analytics

      - name: Use template android project
        run: |
          cd /tmp
          flutter create --org com.uht --project-name uht_store template_app
          cp -r template_app/android/* $GITHUB_WORKSPACE/android/
          cp template_app/.gitignore $GITHUB_WORKSPACE/
          # Fix Kotlin stdlib conflicts
          cat >> $GITHUB_WORKSPACE/android/build.gradle << 'EOF'

subprojects {
    configurations.all {
        resolutionStrategy {
            eachDependency { details ->
                if (details.requested.group == 'org.jetbrains.kotlin') {
                    details.useVersion kotlin_version
                }
            }
        }
    }
}
EOF

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

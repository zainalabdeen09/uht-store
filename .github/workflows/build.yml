name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - run: flutter config --no-analytics

      - name: Regenerate Android project from Flutter template
        run: |
          rm -rf android/
          flutter create --platforms=android --org com.uht --project-name uht_store .

      - name: Dump generated Gradle files for debugging
        run: |
          echo "=== build.gradle ==="
          cat android/build.gradle
          echo "=== settings.gradle ==="
          cat android/settings.gradle
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle

      - name: Fix Kotlin plugin version and add ext.kotlin_version
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle
          if grep -q 'ext.kotlin_version' android/build.gradle; then
            sed -i 's/ext\.kotlin_version = .*/ext.kotlin_version = "2.0.21"/' android/build.gradle
          else
            echo "ext.kotlin_version = \"2.0.21\"" >> android/build.gradle
          fi

      - name: Add resolution strategy for Kotlin stdlib
        run: |
          echo "" >> android/build.gradle
          echo "subprojects {" >> android/build.gradle
          echo "    configurations.all {" >> android/build.gradle
          echo "        resolutionStrategy {" >> android/build.gradle
          echo "            eachDependency { details ->" >> android/build.gradle
          echo '                if (details.requested.group == "org.jetbrains.kotlin") {' >> android/build.gradle
          echo "                    details.useVersion \"2.0.21\"" >> android/build.gradle
          echo "                }" >> android/build.gradle
          echo "            }" >> android/build.gradle
          echo "        }" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

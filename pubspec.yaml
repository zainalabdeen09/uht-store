name: uht_store_app
description: Uhtred Store - متجر يوترد
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.18.1
  http: ^1.2.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/app_icon.jpg"
  adaptive_icon_background: "#0a0a0f"
  adaptive_icon_foreground: "assets/app_icon.jpg"

flutter:
  uses-material-design: true
